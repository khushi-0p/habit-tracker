<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Habit Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand">
    <div class="nav-brand-icon">✓</div>
    Habit Tracker
  </a>
  <ul class="nav-links">
    <li><a href="about.html">About Us</a></li>
    <li><a href="contact.html">Contact Us</a></li>
  </ul>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">✓</div>
      Habit Tracker
    </div>
    <h1 class="auth-heading">Reset password</h1>
    <p class="auth-sub">Enter your email and we'll send a reset link</p>

    <div class="alert alert-error" id="alertBox"></div>
    <div class="alert alert-success" id="successBox"></div>

    <form id="forgotForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="forgotEmail">Email Address</label>
        <input class="form-input" type="email" id="forgotEmail" placeholder="you@example.com" required />
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="forgotBtn">Send Reset Link</button>
    </form>

    <div class="form-footer">
      <a href="login.html">← Back to login</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('forgotBtn');
    const alertEl = document.getElementById('alertBox');
    const successEl = document.getElementById('successBox');
    alertEl.className = 'alert alert-error';
    successEl.className = 'alert alert-success';

    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) {
      alertEl.textContent = 'Please enter your email.';
      alertEl.classList.add('show');
      return;
    }

    btn.textContent = 'Sending…';
    btn.disabled = true;

    try {
      const res = await fetch(`${API_BASE}/api/auth/forgot`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Request failed');
      successEl.textContent = data.message;
      successEl.classList.add('show');
    } catch (err) {
      alertEl.textContent = err.message;
      alertEl.classList.add('show');
    } finally {
      btn.textContent = 'Send Reset Link';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
